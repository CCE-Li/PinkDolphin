version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: phishing_postgres
    environment:
      POSTGRES_DB: phishing_mail
      POSTGRES_USER: phishing
      POSTGRES_PASSWORD: phishing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phishing -d phishing_mail"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: phishing_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: phishing_backend
    env_file:
      - ./backend/.env.example
    environment:
      APP_ENV: docker
      DATABASE_URL: postgresql+psycopg://phishing:phishing@postgres:5432/phishing_mail
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "uv run alembic upgrade head &&
      uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./backend
    container_name: phishing_worker
    env_file:
      - ./backend/.env.example
    environment:
      APP_ENV: docker
      DATABASE_URL: postgresql+psycopg://phishing:phishing@postgres:5432/phishing_mail
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "uv run celery -A app.tasks.celery_app.celery_app worker --loglevel=info
      -Q ${CELERY_DEFAULT_QUEUE:-default}"

  worker_mailbox_analysis:
    build:
      context: ./backend
    container_name: phishing_worker_mailbox_analysis
    env_file:
      - ./backend/.env.example
    environment:
      APP_ENV: docker
      DATABASE_URL: postgresql+psycopg://phishing:phishing@postgres:5432/phishing_mail
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "uv run celery -A app.tasks.celery_app.celery_app worker --loglevel=info --concurrency=1
      -Q ${MAILBOX_ANALYSIS_QUEUE:-mailbox_analysis}"

volumes:
  postgres_data:
